<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 学工助手 · DocFlow</title>
<style>
  :root {
    --brand-50: #eef2ff; --brand-100: #e0e7ff; --brand-200: #c7d2fe;
    --brand-500: #6366f1; --brand-600: #4f46e5; --brand-700: #4338ca;
    --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0; --slate-300: #cbd5e1;
    --slate-400: #94a3b8; --slate-500: #64748b; --slate-600: #475569;
    --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a;
    --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
    --bg: #f5f6f8; --card: #ffffff; --border: #e5e7eb;
    --text: #0f172a; --text-sub: #475569; --text-muted: #94a3b8;
    --radius: 8px; --radius-lg: 12px;
  }
  html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }

  .app-container { display: grid; grid-template-columns: 240px 1fr; height: 100vh; overflow: hidden; }

  /* 侧边栏 */
  .sidebar { background: var(--slate-900); color: #cbd5e1; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 10px; }
  .sidebar-logo { width: 30px; height: 30px; border-radius: 7px; background: linear-gradient(135deg, #6366f1, #4f46e5);
    display: flex; align-items: center; justify-content: center; }
  .sidebar-logo svg { width: 15px; height: 15px; color: #fff; }
  .sb-title { font-size: 13px; font-weight: 600; color: #fff; }
  .sb-sub { font-size: 10px; color: rgba(255,255,255,0.35); }

  .nav-section { padding: 14px 14px 8px; }
  .nav-section-title { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .nav-buttons { display: flex; flex-direction: column; gap: 4px; }
  .nav-btn { padding: 7px 10px; border-radius: 5px; text-decoration: none; color: #cbd5e1;
    font-size: 12px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02);
    transition: all 0.12s; }
  .nav-btn:hover { background: rgba(99,102,241,0.15); color: #c7d2fe; }
  .nav-btn.active { background: linear-gradient(90deg, rgba(99,102,241,0.2), rgba(99,102,241,0.06)); color: #c7d2fe; }

  .quick-actions { padding: 12px 14px; border-top: 1px solid rgba(255,255,255,0.06); }
  .qa-title { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; margin-bottom: 8px; }
  .qa-btn { display: block; width: 100%; padding: 8px 10px; margin-bottom: 4px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03); color: #cbd5e1; font-size: 11.5px; cursor: pointer; text-align: left;
    transition: all 0.12s; }
  .qa-btn:hover { background: rgba(99,102,241,0.15); color: #c7d2fe; border-color: rgba(99,102,241,0.3); }

  /* 主内容区 */
  .main-content { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  .top-bar { background: var(--card); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; min-height: 52px; }
  .top-left { display: flex; align-items: center; gap: 10px; }
  .back-btn { width: 30px; height: 30px; border-radius: 5px; background: var(--card); border: 1px solid var(--border);
    color: var(--slate-500); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.12s; text-decoration: none; }
  .back-btn:hover { background: var(--brand-50); color: var(--brand-600); border-color: var(--brand-200); }
  .back-btn svg { width: 13px; height: 13px; }
  .top-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .top-sub { font-size: 11px; color: var(--slate-500); }
  .top-right { display: flex; align-items: center; gap: 8px; }
  .clear-btn { padding: 6px 10px; border-radius: 5px; background: var(--card); border: 1px solid var(--border);
    color: var(--text-sub); font-size: 11px; cursor: pointer; transition: all 0.12s; }
  .clear-btn:hover { background: var(--slate-100); }

  .chat-messages { flex: 1; overflow-y: auto; padding: 20px; max-width: 800px; width: 100%; margin: 0 auto; }
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .welcome-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 20px 24px; margin-bottom: 20px; }
  .welcome-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .welcome-subtitle { font-size: 12px; color: var(--slate-500); margin-bottom: 14px; }
  .feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .feature-item { padding: 8px 10px; background: var(--slate-50); border: 1px solid var(--border);
    border-radius: 5px; font-size: 11px; color: var(--text-sub); text-align: center; cursor: pointer; transition: all 0.12s; }
  .feature-item:hover { background: var(--brand-50); border-color: var(--brand-200); color: var(--brand-600); }

  .message { margin-bottom: 16px; display: flex; gap: 10px; align-items: flex-start; }
  .message.user { flex-direction: row-reverse; }
  .message-avatar { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; font-size: 12px; font-weight: 600; }
  .message.user .message-avatar { background: var(--brand-600); color: #fff; }
  .message.assistant .message-avatar { background: var(--brand-50); color: var(--brand-600); }
  .message-avatar svg { width: 13px; height: 13px; }
  .message-content { max-width: calc(100% - 48px); }
  .message-bubble { padding: 10px 14px; border-radius: 7px; font-size: 13.5px; line-height: 1.65; word-wrap: break-word; white-space: pre-wrap; }
  .message.user .message-bubble { background: var(--brand-600); color: #fff; }
  .message.assistant .message-bubble { background: var(--card); color: var(--text);
    border: 1px solid var(--border); }
  .msg-meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
  .message.user .msg-meta { text-align: right; }

  .input-area { background: var(--card); border-top: 1px solid var(--border);
    padding: 12px 20px 16px; width: 100%; max-width: 800px; margin: 0 auto; }
  .quick-buttons { margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
  .quick-btn { padding: 5px 10px; border-radius: 12px; font-size: 11px; background: var(--slate-50);
    border: 1px solid var(--border); color: var(--text-sub); cursor: pointer; transition: all 0.12s; }
  .quick-btn:hover { background: var(--brand-50); border-color: var(--brand-200); color: var(--brand-600); }
  .input-wrapper { display: flex; gap: 8px; align-items: flex-end; }
  .input-textarea { flex: 1; padding: 9px 12px; border: 1px solid var(--border); border-radius: 5px;
    resize: none; font-size: 13.5px; font-family: inherit; outline: none; transition: all 0.12s;
    background: var(--card); color: var(--text); }
  .input-textarea:focus { border-color: var(--brand-500); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
  .send-btn { padding: 9px 16px; border-radius: 5px; background: var(--brand-600); color: #fff;
    border: none; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.12s; }
  .send-btn:hover { background: var(--brand-700); }
  .send-btn:disabled { background: var(--slate-400); cursor: not-allowed; }
  .send-btn svg { width: 12px; height: 12px; }
  .hint-text { font-size: 10px; color: var(--text-muted); margin-top: 6px; }

  .typing-indicator { display: inline-flex; align-items: center; color: var(--slate-500); font-size: 12px; gap: 5px; }
  .typing-dots span { display: inline-block; width: 5px; height: 5px; background: var(--slate-300);
    border-radius: 50%; margin: 0 1px; animation: typing 1.4s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

  @media (max-width: 768px) {
    .app-container { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .chat-messages { padding: 12px; }
    .input-area { padding: 10px 12px; }
    .feature-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app-container">

  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      <div><div class="sb-title">AI 学工助手</div><div class="sb-sub">DocFlow v4.0</div></div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">导航</div>
      <div class="nav-buttons">
        <a href="/" class="nav-btn">← 返回工作台</a>
        <a href="/chat" class="nav-btn active">AI 学工助手</a>
      </div>
    </div>
    <div class="quick-actions">
      <div class="qa-title">快捷操作</div>
      <button class="qa-btn" onclick="quickSend('我要请假3天回家')">📝 申请请假</button>
      <button class="qa-btn" onclick="quickSend('我的请假记录')">🔍 查看记录</button>
      <button class="qa-btn" onclick="quickSend('我还有多少天年假')">🌴 假期余额</button>
      <button class="qa-btn" onclick="quickSend('待审批事项')">⏳ 待审批</button>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="main-content">
    <div class="top-bar">
      <div class="top-left">
        <a href="/" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
        <div>
          <div class="top-title">AI 学工助手</div>
          <div class="top-sub">请假申请 · 审批处理 · 数据查询</div>
        </div>
      </div>
      <div class="top-right">
        <button class="clear-btn" onclick="clearChat()">清空对话</button>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="welcome-card">
        <div class="welcome-title">👋 欢迎使用 AI 学工助手</div>
        <div class="welcome-subtitle">我能帮你请假、审批、查询数据，直接告诉我你要做什么</div>
        <div class="feature-grid">
          <div class="feature-item" onclick="quickSend('我要请假3天回家')">📝 申请请假</div>
          <div class="feature-item" onclick="quickSend('我的请假记录')">🔍 查看记录</div>
          <div class="feature-item" onclick="quickSend('我还有多少天年假')">🌴 假期余额</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="quick-buttons" id="quickButtons">
        <span class="quick-btn" onclick="quickSend('我要请假3天回家')">请假3天</span>
        <span class="quick-btn" onclick="quickSend('我的请假记录')">请假记录</span>
        <span class="quick-btn" onclick="quickSend('假期余额')">假期余额</span>
      </div>
      <div class="input-wrapper">
        <textarea class="input-textarea" id="messageInput" rows="2" placeholder="直接告诉我你要做什么... 如：我要请假3天回家" onkeydown="handleKeydown(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="hint-text">直接说你要做什么，我会直接帮你处理。Enter 发送，Shift+Enter 换行</div>
    </div>
  </main>
</div>

<script>
  let token = localStorage.getItem('token');
  let conversationId = 'web_' + Date.now();

  function escapeHTML(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function checkAuth() {
    if (!token) {
      document.getElementById('chatMessages').innerHTML = `
        <div style="padding:50px;text-align:center;max-width:400px;margin:0 auto;">
          <div style="width:40px;height:40px;margin:0 auto 14px;border-radius:8px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;color:#475569;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <h4 style="color:#0f172a;margin-bottom:6px;font-size:16px;font-weight:600;">请先登录</h4>
          <p style="color:#64748b;margin-bottom:20px;font-size:12px;">返回首页登录后再使用 AI 学工助手</p>
          <button onclick="window.location.href='/'" style="padding:8px 20px;background:#4f46e5;color:white;border:none;border-radius:5px;cursor:pointer;font-size:13px;">返回首页登录</button>
        </div>`;
      return false;
    }
    return true;
  }

  function createMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const avatarSVG = role === 'user'
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><path d="M12 2a5 5 0 0 1 5 5v3a5 5 0 0 1-10 0V7a5 5 0 0 1 5-5z"/><line x1="12" y1="15" x2="12" y2="22"/><line x1="9" y1="19" x2="15" y2="19"/></svg>';
    div.innerHTML = `
      <div class="message-avatar">${avatarSVG}</div>
      <div class="message-content">
        <div class="message-bubble">${escapeHTML(text)}</div>
        <div class="msg-meta">${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}</div>
      </div>
    `;
    return div;
  }

  function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function quickSend(text) {
    document.getElementById('messageInput').value = text;
    sendMessage();
  }

  async function sendMessage() {
    if (!checkAuth()) return;
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    const msgs = document.getElementById('chatMessages');

    // 添加用户消息
    msgs.appendChild(createMessage('user', text));
    msgs.scrollTop = msgs.scrollHeight;

    // 添加等待提示
    const waiting = document.createElement('div');
    waiting.className = 'message assistant';
    waiting.innerHTML = `<div class="message-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><path d="M12 2a5 5 0 0 1 5 5v3a5 5 0 0 1-10 0V7a5 5 0 0 1 5-5z"/><line x1="12" y1="15" x2="12" y2="22"/><line x1="9" y1="19" x2="15" y2="19"/></svg></div><div class="message-content"><div class="message-bubble"><span class="typing-indicator"><span class="typing-dots"><span></span><span></span><span></span></span> 处理中...</span></div></div>`;
    msgs.appendChild(waiting);
    msgs.scrollTop = msgs.scrollHeight;

    try {
      const res = await fetch('/api/agents/router', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ message: text, conversationId: conversationId })
      });

      if (res.status === 401 || res.status === 403) {
        waiting.remove();
        localStorage.removeItem('token');
        document.getElementById('chatMessages').innerHTML = '<div style="padding:40px;text-align:center"><h4 style="color:#0f172a;margin-bottom:8px;font-size:16px;">登录已过期</h4><p style="color:#64748b;font-size:13px;margin-bottom:20px;">请返回首页重新登录</p><button onclick="window.location.href=\'/\'" style="padding:8px 20px;background:#4f46e5;color:white;border:none;border-radius:5px;cursor:pointer;font-size:13px;">返回首页登录</button></div>';
        return;
      }

      const result = await res.json();
      waiting.remove();

      if (result.success && result.content) {
        msgs.appendChild(createMessage('assistant', result.content));
      } else {
        msgs.appendChild(createMessage('assistant', '😅 抱歉，处理失败了：' + (result.error || '未知错误')));
      }
    } catch (e) {
      waiting.remove();
      msgs.appendChild(createMessage('assistant', '😅 网络错误：' + e.message));
    }
    msgs.scrollTop = msgs.scrollHeight;
  }

  function clearChat() {
    if (!confirm('确认清空当前对话？')) return;
    conversationId = 'web_' + Date.now();
    document.getElementById('chatMessages').innerHTML = `
      <div class="welcome-card">
        <div class="welcome-title">👋 欢迎使用 AI 学工助手</div>
        <div class="welcome-subtitle">我能帮你请假、审批、查询数据，直接告诉我你要做什么</div>
        <div class="feature-grid">
          <div class="feature-item" onclick="quickSend('我要请假3天回家')">📝 申请请假</div>
          <div class="feature-item" onclick="quickSend('我的请假记录')">🔍 查看记录</div>
          <div class="feature-item" onclick="quickSend('我还有多少天年假')">🌴 假期余额</div>
        </div>
      </div>`;
  }

  // 启动
  (function init() {
    if (!checkAuth()) return;
  })();
</script>
</body>
</html>
