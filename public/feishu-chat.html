<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 智能助手</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f3f4f6; height: 100vh; display: flex; flex-direction: column; }
  .top-bar { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: relative; }
  .top-bar h5 { margin: 0; font-size: 16px; display: flex; align-items: center; gap: 8px; }
  .top-bar .sub { font-size: 12px; opacity: 0.9; margin-top: 4px; }
  .agent-picker { background: white; padding: 12px 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
  .agent-chip { padding: 8px 14px; border-radius: 20px; background: #f1f5f9; color: #475569; font-size: 13px; cursor: pointer; transition: all 0.2s; border: 1px solid #e2e8f0; flex-shrink: 0; }
  .agent-chip.active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border-color: transparent; }
  .chat-area { flex: 1; overflow-y: auto; padding: 12px; background: #f3f4f6; }
  .msg { margin-bottom: 12px; display: flex; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .msg.user .msg-avatar { background: #3b82f6; color: white; margin-left: 8px; }
  .msg.bot .msg-avatar { background: #e0e7ff; color: #4338ca; margin-right: 8px; }
  .msg-bubble { max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.55; word-wrap: break-word; white-space: pre-wrap; }
  .msg.user .msg-bubble { background: #3b82f6; color: white; border-bottom-right-radius: 4px; }
  .msg.bot .msg-bubble { background: white; color: #1f2937; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .msg-meta { font-size: 10px; color: #9ca3af; margin-top: 4px; }
  .msg.user .msg-meta { text-align: right; }
  .quick-area { background: white; padding: 8px 12px; border-top: 1px solid #e5e7eb; white-space: nowrap; overflow-x: auto; }
  .quick-btn { display: inline-block; padding: 6px 12px; margin: 2px; background: #eff6ff; color: #2563eb; border-radius: 16px; font-size: 12px; border: 1px solid #dbeafe; }
  .input-bar { background: white; padding: 10px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; align-items: flex-end; }
  .input-bar textarea { flex: 1; border: 1px solid #e5e7eb; border-radius: 20px; padding: 10px 14px; font-size: 14px; resize: none; outline: none; max-height: 100px; font-family: inherit; }
  .input-bar textarea:focus { border-color: #3b82f6; }
  .input-bar button { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 18px; flex-shrink: 0; cursor: pointer; }
  .input-bar button:disabled { opacity: 0.5; }
  .typing { display: inline-flex; gap: 4px; align-items: center; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; animation: pulse 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
  .login-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px; background: linear-gradient(135deg, #f0f9ff, #faf5ff); }
  .login-card { background: white; padding: 28px 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; width: 100%; max-width: 360px; }
  .login-card h3 { margin: 0 0 8px; color: #1f2937; }
  .login-card p { color: #6b7280; font-size: 14px; margin: 0 0 20px; }
  .login-card input { width: 100%; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none; }
  .login-card input:focus { border-color: #3b82f6; }
  .login-card button { width: 100%; padding: 12px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .welcome-msg { background: white; border-radius: 14px; padding: 16px; margin-bottom: 14px; text-align: center; border: 1px solid #e5e7eb; }
  .welcome-msg h5 { margin: 0 0 8px; color: #1f2937; font-size: 15px; }
  .welcome-msg .tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 10px; }
  .welcome-msg .tag { font-size: 11px; padding: 4px 10px; background: #f1f5f9; border-radius: 12px; color: #475569; }
  code { background: #f1f5f9; padding: 1px 5px; border-radius: 3px; font-size: 85%; color: #dc2626; }
  .msg-bubble pre { background: #1e293b; color: #e2e8f0; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-size: 12px; }
  .msg.bot .msg-bubble code { background: #fef3c7; color: #92400e; }
  .msg.bot .msg-bubble pre code { background: transparent; color: inherit; }
</style>
</head>
<body>
<div id="loginScreen" class="login-screen" style="display:none;">
  <div class="login-card">
    <h3><i class="bi bi-robot" style="color:#3b82f6"></i> AI 智能助手</h3>
    <p>企业公文流转系统 AI 服务</p>
    <input type="text" id="loginUser" placeholder="用户名 (admin / user1 / user2)" value="admin">
    <input type="password" id="loginPass" placeholder="密码" value="123456">
    <button onclick="doLogin()">登录</button>
  </div>
</div>

<div id="mainScreen" style="display:flex; flex:1; flex-direction:column;">
  <div class="top-bar">
    <h5><i class="bi bi-robot"></i> <span id="agentName">通用助手</span></h5>
    <div class="sub" id="agentDesc">综合对话、问答服务</div>
  </div>

  <div class="agent-picker" id="agentPicker"></div>

  <div class="chat-area" id="chatArea">
    <div class="welcome-msg">
      <h5>👋 欢迎使用智能助手</h5>
      <div class="tags">
        <span class="tag">🤖 硅基流动驱动</span>
        <span class="tag">📄 公文撰写</span>
        <span class="tag">🏖️ 审批分析</span>
        <span class="tag">📊 数据统计</span>
      </div>
    </div>
  </div>

  <div class="quick-area" id="quickArea"></div>

  <div class="input-bar">
    <textarea id="msgInput" rows="1" placeholder="输入消息..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button onclick="sendMsg()" id="sendBtn"><i class="bi bi-send"></i></button>
  </div>
</div>

<script>
let token = localStorage.getItem('feishu_token') || localStorage.getItem('token');
let currentAgent = 'general';
let conversationIds = {};
let agentsList = [];
let msgCount = 0;

const quickMap = {
  general: ['介绍系统功能', '如何提交请假？', '今日提醒'],
  coder: ['Python 读 Excel', 'SQL 查询优化', 'REST API 示例'],
  document: ['写会议通知', '润色文档', '工作总结模板'],
  approval: ['分析请假申请', '审批回复模板', '审批流程设计'],
  data: ['分析请假数据', '制作统计报告', '数据采集建议'],
  reasoning: ['是否引入新功能？', '方案对比分析', '深度业务分析']
};

function escapeHTML(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function formatText(text) {
  let html = escapeHTML(text);
  html = html.replace(/```([\s\S]*?)```/g, (m, c) => '<pre><code>' + c.trim() + '</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (!u || !p) return alert('请输入用户名和密码');
  try {
    const res = await fetch('/api/public/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.token) {
      token = data.token;
      localStorage.setItem('token', token);
      localStorage.setItem('feishu_token', token);
      showMain();
      initChat();
    } else {
      alert('登录失败: ' + (data.message || '未知错误'));
    }
  } catch (e) { alert('网络错误: ' + e.message); }
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainScreen').style.display = 'none';
}

function showMain() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'flex';
}

async function loadAgents() {
  try {
    const res = await fetch('/api/agents');
    const data = await res.json();
    agentsList = data.agents || [];
    renderPicker();
    selectAgent(currentAgent);
  } catch (e) { console.error(e); }
}

function renderPicker() {
  const el = document.getElementById('agentPicker');
  el.innerHTML = agentsList.map(a => `<div class="agent-chip ${a.id===currentAgent?'active':''}" onclick="selectAgent('${a.id}')">${a.name}</div>`).join('');
}

function selectAgent(id) {
  currentAgent = id;
  const a = agentsList.find(x => x.id === id);
  if (!a) return;
  document.getElementById('agentName').textContent = a.name.replace(/^[^\s]+\s/, '');
  document.getElementById('agentDesc').textContent = a.description;
  renderPicker();
  renderQuick();
  if (!conversationIds[id]) {
    conversationIds[id] = id + '_' + Date.now();
    if (msgCount > 0) {
      const div = document.createElement('div');
      div.style.cssText = 'text-align:center; color:#9ca3af; font-size:12px; padding:8px;';
      div.textContent = '—— 切换到 ' + a.name + ' ——';
      document.getElementById('chatArea').appendChild(div);
    }
    addMsg('bot', a.name.split(' ')[1] || '🤖', '您好！我是' + a.name + '，' + a.description + '。有什么可以帮您的？');
  }
}

function renderQuick() {
  const el = document.getElementById('quickArea');
  const prompts = quickMap[currentAgent] || [];
  el.innerHTML = prompts.map(p => `<span class="quick-btn" onclick="quickSend('${p}')">💡 ${p}</span>`).join('');
}

function quickSend(t) {
  document.getElementById('msgInput').value = t;
  sendMsg();
}

function addMsg(role, avatar, text, extra) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const metaHTML = `<div class="msg-meta">${new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'})}${extra || ''}</div>`;
  if (role === 'user') {
    div.innerHTML = `<div class="msg-avatar">我</div><div><div class="msg-bubble">${formatText(text)}</div>${metaHTML}</div>`;
  } else {
    div.innerHTML = `<div class="msg-avatar">${avatar}</div><div><div class="msg-bubble">${formatText(text)}</div>${metaHTML}</div>`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  msgCount++;
}

function addTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div><div class="msg-bubble"><span class="typing"><span></span><span></span><span></span></span> 正在思考...</div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResize(input);

  addMsg('user', '我', text);
  addTyping();
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch('/api/agents/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ agentId: currentAgent, message: text, conversationId: conversationIds[currentAgent] })
    });
    
    if (res.status === 401 || res.status === 403) {
      removeTyping();
      localStorage.removeItem('token');
      localStorage.removeItem('feishu_token');
      alert('登录已过期，请重新登录');
      showLogin();
      document.getElementById('sendBtn').disabled = false;
      return;
    }
    
    const data = await res.json();
    removeTyping();

    if (data.success) {
      const a = agentsList.find(x => x.id === currentAgent);
      const avatar = a ? (a.name.split(' ')[1] || '🤖') : '🤖';
      addMsg('bot', avatar, data.content, ` · <span style="color:#3b82f6">${data.tokens}t · ${data.elapsed}ms</span>`);
    } else {
      addMsg('bot', '⚠️', '错误: ' + (data.error || '请求失败'));
    }
  } catch (e) {
    removeTyping();
    addMsg('bot', '⚠️', '网络错误: ' + e.message);
  }
  document.getElementById('sendBtn').disabled = false;
}

async function initChat() {
  await loadAgents();
}

if (!token) {
  showLogin();
} else {
  showMain();
  initChat();
}
</script>
</body>
</html>
