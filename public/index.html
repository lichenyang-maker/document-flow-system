<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>公文流转系统 · DocFlow</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --brand-50:#eef2ff;--brand-100:#e0e7ff;--brand-200:#c7d2fe;--brand-500:#6366f1;--brand-600:#4f46e5;--brand-700:#4338ca;
  --slate-50:#f8fafc;--slate-100:#f1f5f9;--slate-200:#e2e8f0;--slate-300:#cbd5e1;--slate-400:#94a3b8;
  --slate-500:#64748b;--slate-600:#475569;--slate-700:#334155;--slate-800:#1e293b;--slate-900:#0f172a;--slate-950:#020617;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;
  --bg:#f5f6f8;--card:#ffffff;--border:#e5e7eb;--border-strong:#d1d5db;
  --text:#0f172a;--text-sub:#475569;--text-muted:#94a3b8;
  --radius-xs:4px;--radius-sm:6px;--radius:8px;--radius-lg:12px;--radius-xl:16px;
  --shadow-sm:0 1px 2px rgba(15,23,42,0.04);--shadow:0 1px 3px rgba(15,23,42,0.08),0 1px 2px rgba(15,23,42,0.04);
  --shadow-md:0 4px 6px -1px rgba(15,23,42,0.08),0 2px 4px -2px rgba(15,23,42,0.04);
  --shadow-lg:0 10px 15px -3px rgba(15,23,42,0.08),0 4px 6px -4px rgba(15,23,42,0.04);
  --shadow-xl:0 20px 25px -5px rgba(15,23,42,0.1),0 8px 10px -6px rgba(15,23,42,0.05);
}
html{font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:"SF Pro Display","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;overflow-x:hidden;font-size:14px;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:inherit}

/* ============ 登录页 ============ */
.login-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:#fff}
.login-hero{
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#334155 100%);
  color:#fff;padding:64px 56px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;
}
.login-hero::before{content:"";position:absolute;inset:0;background:
  radial-gradient(ellipse at top right,rgba(99,102,241,0.25),transparent 50%),
  radial-gradient(ellipse at bottom left,rgba(59,130,246,0.2),transparent 50%);pointer-events:none;
}
.login-hero::after{content:"";position:absolute;right:-100px;bottom:-100px;width:400px;height:400px;background:
  radial-gradient(circle,rgba(99,102,241,0.15),transparent 70%);pointer-events:none;
}
.brand{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.brand-logo{
  width:44px;height:44px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:10px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(99,102,241,0.4);
}
.brand-logo svg{width:24px;height:24px;color:#fff}
.brand-text .b-name{font-size:17px;font-weight:700;letter-spacing:0.3px}
.brand-text .b-sub{font-size:12px;color:rgba(255,255,255,0.55);margin-top:2px}
.hero-content{position:relative;z-index:1;max-width:420px}
.hero-content h1{font-size:32px;font-weight:700;line-height:1.3;margin-bottom:16px;letter-spacing:-0.5px}
.hero-content p{color:rgba(255,255,255,0.7);font-size:15px;line-height:1.7;margin-bottom:40px}
.feat-list{display:flex;flex-direction:column;gap:18px}
.feat{display:flex;gap:14px;align-items:flex-start}
.feat-icon{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.feat-icon svg{width:18px;height:18px;color:#a5b4fc}
.feat h4{font-size:14px;font-weight:600;margin-bottom:4px}
.feat p{font-size:13px;color:rgba(255,255,255,0.55);line-height:1.5;margin:0}
.hero-footer{position:relative;z-index:1;font-size:12px;color:rgba(255,255,255,0.4);display:flex;justify-content:space-between;align-items:center}
.hero-footer .ver{padding:4px 10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:4px;font-family:monospace;font-size:11px}

.login-box-wrap{display:flex;align-items:center;justify-content:center;padding:56px;background:var(--slate-50)}
.login-card{width:100%;max-width:400px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;box-shadow:var(--shadow-sm)}
.login-card h2{font-size:22px;font-weight:700;margin-bottom:8px;color:var(--text);letter-spacing:-0.3px}
.login-card .hint{color:var(--slate-500);font-size:13px;margin-bottom:32px}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text-sub);margin-bottom:6px}
.field input{
  width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;
  transition:border-color .15s,box-shadow .15s;background:#fff;
}
.field input:focus{border-color:var(--brand-500);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.field input::placeholder{color:var(--text-muted)}
.btn-primary{
  width:100%;padding:11px 18px;border:none;border-radius:var(--radius-sm);background:var(--brand-600);color:#fff;font-size:14px;font-weight:500;
  cursor:pointer;transition:background .15s,box-shadow .15s;margin-top:8px;letter-spacing:0.3px;
}
.btn-primary:hover{background:var(--brand-700)}
.btn-primary:active{transform:translateY(1px)}
.error-msg{color:var(--danger);font-size:12px;text-align:center;margin-top:12px;min-height:16px}
.login-tip{margin-top:24px;padding:12px 14px;background:var(--slate-50);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;color:var(--slate-500);line-height:1.6}.account-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}.account-table td{padding:3px 4px;vertical-align:middle}.account-table code{background:var(--slate-200);padding:1px 5px;border-radius:3px;font-size:11px}
.login-tip b{color:var(--text-sub);font-weight:600}
.role-admin td:first-child{color:#7c3aed}.role-counselor td:first-child{color:#0891b2}.role-teacher td:first-child{color:#2563eb}.role-student td:first-child{color:#059669}
.login-tip code{background:var(--slate-200);padding:1px 4px;border-radius:3px;font-size:11px}
@media(max-width:900px){.login-wrap{grid-template-columns:1fr}.login-hero{display:none}.login-box-wrap{padding:24px}}

/* ============ 应用主布局 ============ */
.app{display:flex;min-height:100vh}
.hidden{display:none!important}

/* 侧边栏 */
.sidebar{
  width:232px;background:var(--slate-900);color:#cbd5e1;display:flex;flex-direction:column;flex-shrink:0;
  position:sticky;top:0;height:100vh;z-index:10;
}
.sidebar-brand{padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px}
.sidebar-brand .sb-logo{width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(99,102,241,0.3)}
.sidebar-brand .sb-logo svg{width:18px;height:18px;color:#fff}
.sidebar-brand .sb-text{line-height:1.1}
.sidebar-brand .sb-name{font-size:14px;font-weight:700;color:#fff;letter-spacing:0.2px}
.sidebar-brand .sb-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.sb-section{padding:16px 12px 6px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:0.8px;text-transform:uppercase}
.sidebar nav{flex:1;padding:4px 10px;overflow-y:auto}
.sidebar nav::-webkit-scrollbar{width:4px}
.sidebar nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer;color:#cbd5e1;
  font-size:13.5px;transition:all .12s;margin-bottom:2px;user-select:none;position:relative;
}
.nav-item svg{width:16px;height:16px;flex-shrink:0;color:#94a3b8}
.nav-item:hover{background:rgba(255,255,255,0.05);color:#e2e8f0}
.nav-item:hover svg{color:#cbd5e1}
.nav-item.active{background:linear-gradient(90deg,rgba(99,102,241,0.22),rgba(99,102,241,0.08));color:#fff;font-weight:500}
.nav-item.active svg{color:#a5b4fc}
.nav-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;background:#6366f1;border-radius:0 2px 2px 0}
.nav-tag{margin-left:auto;padding:2px 7px;font-size:10px;background:var(--brand-500);color:#fff;border-radius:4px;font-weight:600;letter-spacing:0.3px}
.sidebar-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.sidebar-user:hover{background:rgba(255,255,255,0.04)}
.sidebar-user .avatar{
  width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#475569,#334155);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;
}
.sidebar-user .u-meta{line-height:1.25;flex:1;min-width:0}
.sidebar-user .u-name{font-size:13px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user .u-role{font-size:11px;color:rgba(255,255,255,0.45);margin-top:3px}
.sidebar-user .u-more{color:rgba(255,255,255,0.3);font-size:16px;line-height:1}

/* 主内容 */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  background:#fff;border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:5;
}
.tb-left{display:flex;align-items:center;gap:14px}
.page-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:0.2px}
.page-crumb{font-size:12px;color:var(--slate-400);margin-left:2px}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-search{position:relative;display:flex;align-items:center}
.tb-search svg{position:absolute;left:11px;color:var(--slate-400);width:14px;height:14px}
.tb-search input{
  padding:7px 12px 7px 34px;border:1px solid var(--border);border-radius:6px;background:var(--slate-50);
  width:220px;font-size:13px;outline:none;transition:all .15s;
}
.tb-search input:focus{border-color:var(--brand-500);background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.tb-icon-btn{
  width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  color:var(--slate-500);transition:all .12s;position:relative;
}
.tb-icon-btn:hover{background:var(--slate-50);color:var(--text)}
.tb-icon-btn svg{width:16px;height:16px}
.tb-icon-btn .dot{position:absolute;top:8px;right:8px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid #fff}

.page{flex:1;padding:28px 32px;min-width:0}
.page.active{display:block}

/* 工作台头部 */
.hero-bar{
  background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px 28px;margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;gap:24px;
  background:linear-gradient(135deg,#fff 0%,#fafbff 100%);
}
.hero-bar .hb-left{flex:1;min-width:0}
.hero-bar h2{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-0.2px}
.hero-bar p{font-size:13px;color:var(--slate-500)}
.hero-bar .hb-meta{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap}
.hero-bar .hb-meta>div{font-size:12px;color:var(--slate-500);display:flex;align-items:center;gap:6px}
.hero-bar .hb-meta b{color:var(--text);font-weight:600}
.hero-bar .hb-right{display:flex;gap:8px;flex-shrink:0}

.btn{
  padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;
  transition:all .12s;display:inline-flex;align-items:center;gap:6px;letter-spacing:0.1px;
}
.btn svg{width:14px;height:14px}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text-sub)}
.btn-ghost:hover{background:var(--slate-50);border-color:var(--border-strong);color:var(--text)}
.btn-accent{background:var(--brand-600);color:#fff;border:1px solid var(--brand-600)}
.btn-accent:hover{background:var(--brand-700);border-color:var(--brand-700)}
.btn-dark{background:var(--slate-800);color:#fff;border:1px solid var(--slate-800)}
.btn-dark:hover{background:var(--slate-900);border-color:var(--slate-900)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-danger:hover,.btn-success:hover{filter:brightness(0.92)}

/* 统计卡片网格 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;
  transition:all .15s;position:relative;overflow:hidden;
}
.stat-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}
.stat-card .sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.stat-card .sc-label{font-size:12.5px;color:var(--slate-500);font-weight:500}
.stat-card .sc-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.stat-card .sc-icon svg{width:16px;height:16px}
.stat-card .sc-num{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-0.5px;line-height:1.1;margin-bottom:6px}
.stat-card .sc-trend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--slate-500)}
.stat-card .sc-trend .tr-up{color:var(--success)}
.stat-card .sc-trend .tr-flat{color:var(--slate-400)}
.stat-card .sc-bar{margin-top:14px;height:4px;background:var(--slate-100);border-radius:2px;overflow:hidden}
.stat-card .sc-bar span{display:block;height:100%;border-radius:2px}
.c-primary .sc-icon{background:var(--brand-50);color:var(--brand-600)}
.c-primary .sc-bar span{background:var(--brand-500)}
.c-info .sc-icon{background:#eff6ff;color:var(--info)}
.c-info .sc-bar span{background:var(--info)}
.c-success .sc-icon{background:#ecfdf5;color:var(--success)}
.c-success .sc-bar span{background:var(--success)}
.c-warning .sc-icon{background:#fffbeb;color:var(--warning)}
.c-warning .sc-bar span{background:var(--warning)}

/* 双栏布局 */
.two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
@media(max-width:1100px){.two-col{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}

/* 卡片组件 */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:14px;font-weight:600;color:var(--text);letter-spacing:0.1px}
.card-header .ch-meta{font-size:12px;color:var(--slate-400)}
.card-header .ch-actions{display:flex;gap:6px}
.ch-link{font-size:12.5px;color:var(--brand-600);font-weight:500;cursor:pointer;padding:4px 8px;border-radius:4px}
.ch-link:hover{background:var(--brand-50)}
.card-body{padding:20px}

/* 表格 */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.filters{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--slate-50)}
.filters select,.filters input{padding:7px 10px 7px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;background:#fff;color:var(--text-sub);min-width:120px}
.filters select:focus,.filters input:focus{border-color:var(--brand-500);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.filters .spacer{flex:1}
.table{width:100%;border-collapse:collapse}
.table thead th{
  background:var(--slate-50);text-align:left;padding:11px 20px;font-size:12px;font-weight:600;
  color:var(--slate-500);letter-spacing:0.3px;border-bottom:1px solid var(--border);white-space:nowrap;
}
.table tbody td{padding:14px 20px;font-size:13.5px;border-bottom:1px solid var(--border);color:var(--text-sub);vertical-align:middle}
.table tbody tr:last-child td{border-bottom:none}
.table tbody tr{transition:background .1s}
.table tbody tr:hover{background:#fafbfc}
.cell-title{font-weight:500;color:var(--text);cursor:pointer}
.cell-title:hover{color:var(--brand-600)}
.cell-meta{font-size:12px;color:var(--slate-400);margin-top:2px}

/* 状态标签 */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;font-size:11.5px;font-weight:500;letter-spacing:0.2px;font-family:-apple-system,sans-serif}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-pending{background:#fff7ed;color:#c2410c}
.badge-pending::before{background:#f97316}
.badge-approved{background:#ecfdf5;color:#059669}
.badge-approved::before{background:#10b981}
.badge-rejected{background:#fef2f2;color:#dc2626}
.badge-rejected::before{background:#ef4444}
.badge-draft{background:#f1f5f9;color:#64748b}
.badge-draft::before{background:#94a3b8}

/* 操作按钮组 */
.actions{display:flex;gap:4px;align-items:center}
.btn-sm{padding:5px 10px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .12s}
.btn-sm:hover{filter:brightness(0.92)}
.btn-sm.btn-approve{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
.btn-sm.btn-approve:hover{background:#d1fae5}
.btn-sm.btn-reject{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn-sm.btn-reject:hover{background:#fee2e2}
.btn-sm.btn-view{background:#fff;color:var(--text-sub);border:1px solid var(--border)}
.btn-sm.btn-view:hover{background:var(--slate-50);color:var(--text)}

/* 空状态 */
.empty{padding:48px 24px;text-align:center;color:var(--slate-400);font-size:13px}
.empty svg{width:36px;height:36px;color:var(--slate-200);margin-bottom:12px}

/* 活动列表 */
.act-list{padding:4px 0}
.act-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);transition:background .1s}
.act-item:last-child{border-bottom:none}
.act-item:hover{background:#fafbfc;margin:0 -20px;padding:14px 20px;border-bottom-color:transparent;border-radius:6px}
.act-dot{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.act-dot svg{width:14px;height:14px}
.act-dot.a-pending{background:#fff7ed;color:#f97316}
.act-dot.a-approved{background:#ecfdf5;color:#10b981}
.act-dot.a-rejected{background:#fef2f2;color:#ef4444}
.act-dot.a-draft{background:#f1f5f9;color:#64748b}
.act-main{flex:1;min-width:0}
.act-title{font-size:13.5px;color:var(--text);font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-sub{font-size:12px;color:var(--slate-400);display:flex;gap:10px;flex-wrap:wrap}
.act-sub span{display:inline-flex;align-items:center;gap:4px}
.act-time{font-size:12px;color:var(--text-muted);flex-shrink:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;white-space:nowrap}

/* 快捷入口 */
.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.quick-item{
  padding:14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .12s;
  display:flex;align-items:center;gap:12px;background:#fff;
}
.quick-item:hover{border-color:var(--brand-200);background:var(--brand-50);transform:translateY(-1px)}
.quick-icon{width:32px;height:32px;border-radius:7px;background:var(--slate-50);display:flex;align-items:center;justify-content:center;color:var(--slate-500)}
.quick-item:hover .quick-icon{background:var(--brand-100);color:var(--brand-600)}
.quick-icon svg{width:15px;height:15px}
.quick-text{line-height:1.25;flex:1;min-width:0}

.modal{

}

.modal-body{padding:24px;max-height:70vh;overflow-y:auto}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--slate-50)}

.form-field{margin-bottom:18px}

.form-label{display:block;font-size:13px;font-weight:500;color:var(--text-sub);margin-bottom:6px}

.toast-error{background:#ef4444}

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
let token = '', currentUser = null, userRole = '';

document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() });

async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  err.textContent = '';
  if (!u || !p) { err.textContent = '请输入用户名和密码'; return; }
  try {
    const res = await fetch(API + '/api/public/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
    if (!res.ok) { const d = await res.json(); err.textContent = d.message || '登录失败'; return; }
    const data = await res.json();
    token = data.token;
    localStorage.setItem('token', token);
    if (data.user) localStorage.setItem('currentUser', JSON.stringify(data.user));
    await initApp();
  } catch (e) { err.textContent = '网络错误，请检查后端服务'; }
}

async function initApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  try {
    const res = await fetch(API + '/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) { logout(); return; }
    currentUser = await res.json();
    localStorage.setItem('currentUser', JSON.stringify(currentUser));
    userRole = currentUser.role || '';
    const roleNames = { ADMIN:'管理员', COUNSELOR:'辅导员', TEACHER:'老师', STUDENT:'学生', EMPLOYEE:'职工', MANAGER:'部门经理', HR:'人事' };
    const name = currentUser.name || currentUser.username || '用户';
    document.getElementById('sidebarUser').textContent = name;
    document.getElementById('sidebarRole').textContent = roleNames[userRole] || userRole;
    document.getElementById('avatarLetter').textContent = name.charAt(0).toUpperCase();
    document.getElementById('mobileUser').textContent = name;
    document.getElementById('welcomeText').textContent = name + '，欢迎回来';
    const now = new Date();
    document.getElementById('todayDate').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'long' });
    // 根据角色显示/隐藏菜单
    buildSidebar(userRole);
  } catch (e) {}
  checkMobile();
  loadDashboard();
}

function logout() {
  token = ''; currentUser = null; isAdmin = false;
  localStorage.removeItem('token'); localStorage.removeItem('currentUser');
  document.getElementById('loginPage').style.display = 'block';
  document.getElementById('mainApp').style.display = 'none';
}

(function autoLogin() {
  const saved = localStorage.getItem('token');
  if (saved) { token = saved; initApp(); }
})();

-=SWITCHMARKER=-
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => { p.style.display = 'none'; p.classList.remove('active'); });
  if (el) el.classList.add('active');
  const pg = document.getElementById('page-' + page);
  if (pg) { pg.style.display = 'block'; pg.classList.add('active'); }
  const titleMap = { dashboard: '概览', docs: '公文管理', leave: '请假管理' };
  document.getElementById('pageTitle').textContent = titleMap[page] || '概览';
  closeSidebar();
  if (page === 'dashboard') loadDashboard();
  else if (page === 'docs') loadDocs();
  else if (page === 'leave') loadLeave();
}

function checkMobile() {
  const m = window.innerWidth <= 768;
  document.getElementById('mobileHeader').style.display = m ? 'flex' : 'none';
  if (!m) document.getElementById('sidebar').classList.remove('open');
}
window.addEventListener('resize', checkMobile);
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

function getHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }
function showToast(msg, type = 'success') {
  const wrap = document.getElementById('toastWrap') || (() => {
    const d = document.createElement('div'); d.className = 'toast-wrap'; d.id = 'toastWrap'; document.body.appendChild(d); return d;
  })();
  const t = document.createElement('div'); t.className = 'toast toast-' + type; t.textContent = msg;
  wrap.appendChild(t); setTimeout(() => t.remove(), 2500);
}
function statusBadge(s) {
  if (!s) return '—';
  const key = String(s).toLowerCase();
  const labelMap = { pending: '待审批', approved: '已通过', rejected: '已驳回', draft: '草稿' };
  return '<span class="badge badge-' + key + '">' + (labelMap[key] || s) + '</span>';
}
function typeDisplay(t) { if (!t) return '—'; const m = { NOTICE: '通知', ANNOUNCEMENT: '公告', PROPOSAL: '请示', REPORT: '报告', APPROVAL: '批复', MEMO: '纪要' }; return m[t.toUpperCase()] || t; }
function fmtDate(d) { if (!d) return '—'; try { return new Date(d).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }); } catch (e) { return d; } }

async function loadDashboard() {
  try {
    const res = await fetch(API + '/api/stats', { headers: { 'Authorization': 'Bearer ' + token } });
    if (res.ok) {
      const s = await res.json();
      document.getElementById('statDocs').textContent = s.totalDocs ?? s.docs ?? '0';
      document.getElementById('statUsers').textContent = s.totalUsers ?? s.users ?? '0';
      document.getElementById('statLeave').textContent = s.totalLeave ?? s.leave ?? '0';
      document.getElementById('statPending').textContent = (s.pendingDocs ?? s.pendingLeave ?? s.pending) ?? '0';
      document.getElementById('pendingCount').textContent = (s.pendingDocs ?? s.pendingLeave ?? s.pending) ?? '0';
      document.getElementById('onlineUsers').textContent = s.totalUsers ?? s.users ?? '—';
    }
  } catch (e) {}
  try {
    const res = await fetch(API + '/api/docs?limit=5', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) return;
    const docs = await res.json();
    const list = docs.data || docs || [];
    if (!list.length) {
      document.getElementById('activityList').innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><div>暂无动态</div></div>';
      return;
    }
    document.getElementById('activityList').innerHTML = list.map(d => {
      const st = String(d.status || '').toLowerCase();
      const iconMap = {
        pending: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
        approved: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
        rejected: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
        draft: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>'
      };
      return '<div class="act-item"><div class="act-dot a-' + st + '">' + (iconMap[st] || iconMap.draft) + '</div><div class="act-main"><div class="act-title">' + (d.title || '无标题') + '</div><div class="act-sub"><span>' + typeDisplay(d.type) + '</span><span>' + (d.applicant_name || d.applicant || d.username || '') + '</span></div></div><div class="act-time">' + fmtDate(d.created_at || d.createdAt) + '</div></div>';
    }).join('');
  } catch (e) {}
}

async function loadDocs() {
  const type = document.getElementById('filterDocType').value;
  const status = document.getElementById('filterDocStatus').value;
  const params = new URLSearchParams();
  if (type) params.set('type', type);
  if (status) params.set('status', status);
  try {
    const res = await fetch(API + '/api/docs?' + params.toString(), { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) return;
    const data = await res.json();
    const list = data.data || data || [];
    document.getElementById('docCount').textContent = list.length;
    if (!list.length) { document.getElementById('docsBody').innerHTML = '<tr><td colspan="6" style="padding:48px;text-align:center;color:#94a3b8;font-size:13px">暂无数据</td></tr>'; return; }
    document.getElementById('docsBody').innerHTML = list.map(d => {
      let actions = '';
      if (isAdmin && String(d.status || '').toLowerCase() === 'pending') actions = '<button class="btn-sm btn-approve" onclick="approveDoc(\'' + d.id + '\')">通过</button> <button class="btn-sm btn-reject" onclick="rejectDoc(\'' + d.id + '\')">驳回</button>';
      return '<tr><td class="cell-title">' + (d.title || '—') + '</td><td>' + typeDisplay(d.type) + '</td><td>' + statusBadge(d.status) + '</td><td>' + (d.applicant_name || d.applicant || d.username || '—') + '</td><td>' + fmtDate(d.created_at || d.createdAt) + '</td><td style="text-align:right;padding-right:20px">' + actions + '</td></tr>';
    }).join('');
  } catch (e) { document.getElementById('docsBody').innerHTML = '<tr><td colspan="6" style="padding:48px;text-align:center;color:#94a3b8;font-size:13px">加载失败</td></tr>'; }
}

async function loadLeave() {
  const status = document.getElementById('filterLeaveStatus').value;
  const params = new URLSearchParams();
  if (status) params.set('status', status);
  try {
    const res = await fetch(API + '/api/leave?' + params.toString(), { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) return;
    const data = await res.json();
    const list = data.data || data || [];
    document.getElementById('leaveCount').textContent = list.length;
    if (!list.length) { document.getElementById('leaveBody').innerHTML = '<tr><td colspan="7" style="padding:48px;text-align:center;color:#94a3b8;font-size:13px">暂无数据</td></tr>'; return; }
    document.getElementById('leaveBody').innerHTML = list.map(d => {
      let actions = '';
      if (isAdmin && String(d.status || '').toLowerCase() === 'pending') actions = '<button class="btn-sm btn-approve" onclick="approveLeave(\'' + d.id + '\')">通过</button> <button class="btn-sm btn-reject" onclick="rejectLeave(\'' + d.id + '\')">驳回</button>';
      return '<tr><td class="cell-title">' + (d.user_name || d.applicant || d.username || '—') + '</td><td>' + (d.type || '—') + '</td><td>' + (d.days ?? '—') + '</td><td>' + (d.start_date || d.startDate || '—') + '</td><td>' + (d.end_date || d.endDate || '—') + '</td><td>' + statusBadge(d.status) + '</td><td style="text-align:right;padding-right:20px">' + actions + '</td></tr>';
    }).join('');
  } catch (e) { document.getElementById('leaveBody').innerHTML = '<tr><td colspan="7" style="padding:48px;text-align:center;color:#94a3b8;font-size:13px">加载失败</td></tr>'; }
}

async function approveLeave(id) { try { await fetch(API + '/api/leave/' + id + '/approve', { method: 'POST', headers: getHeaders() }); showToast('已通过'); } catch (e) { showToast('操作失败', 'error'); } loadLeave(); loadDashboard(); }
async function rejectLeave(id) { try { await fetch(API + '/api/leave/' + id + '/reject', { method: 'POST', headers: getHeaders() }); showToast('已驳回'); } catch (e) { showToast('操作失败', 'error'); } loadLeave(); loadDashboard(); }
async function approveDoc(id) { try { await fetch(API + '/api/docs/' + id + '/approve', { method: 'POST', headers: getHeaders() }); showToast('已通过'); } catch (e) { showToast('操作失败', 'error'); } loadDocs(); loadDashboard(); }
async function rejectDoc(id) { try { await fetch(API + '/api/docs/' + id + '/reject', { method: 'POST', headers: getHeaders() }); showToast('已驳回'); } catch (e) { showToast('操作失败', 'error'); } loadDocs(); loadDashboard(); }

function showDocModal() { document.getElementById('docModal').classList.remove('hidden'); document.getElementById('docTitle').focus(); }
function closeDocModal() { document.getElementById('docModal').classList.add('hidden'); }
async function submitDoc() {
  const title = document.getElementById('docTitle').value.trim();
  if (!title) { showToast('请输入标题', 'error'); return; }
  const body = { title, content: document.getElementById('docContent').value, type: document.getElementById('docType').value, priority: document.getElementById('docPriority').value };
  try {
    const res = await fetch(API + '/api/docs', { method: 'POST', headers: getHeaders(), body: JSON.stringify(body) });
    if (!res.ok) { showToast('提交失败', 'error'); return; }
    showToast('公文已提交审批'); closeDocModal();
    document.getElementById('docTitle').value = ''; document.getElementById('docContent').value = '';
    loadDocs(); loadDashboard();
  } catch (e) { showToast('网络错误', 'error'); }
}

function showLeaveModal() {
  document.getElementById('leaveModal').classList.remove('hidden');
  const t = new Date(); const iso = t.toISOString().slice(0, 10);
  document.getElementById('leaveStart').value = iso;
  document.getElementById('leaveEnd').value = iso;
  document.getElementById('leaveDays').value = '1';
}
function closeLeaveModal() { document.getElementById('leaveModal').classList.add('hidden'); }
async function submitLeave() {
  const startDate = document.getElementById('leaveStart').value;
  const endDate = document.getElementById('leaveEnd').value;
  const days = parseInt(document.getElementById('leaveDays').value) || 1;
  if (!startDate || !endDate) { showToast('请选择日期', 'error'); return; }
  const body = { type: document.getElementById('leaveType').value, startDate, endDate, days, reason: document.getElementById('leaveReason').value };
  try {
    const res = await fetch(API + '/api/leave', { method: 'POST', headers: getHeaders(), body: JSON.stringify(body) });
    if (!res.ok) { showToast('提交失败', 'error'); return; }
    showToast('请假申请已提交'); closeLeaveModal();
    document.getElementById('leaveReason').value = '';
    loadLeave(); loadDashboard();
  } catch (e) { showToast('网络错误', 'error'); }
}


// ===== 角色菜单构建 =====
function buildSidebar(role) {
  var nav = document.getElementById('sidebarNav');
  if (!nav) return;
  var menus = {
    ADMIN:[{p:'dashboard',i:'\ud83d\udcca',l:'\u5de5\u4f5c\u53f0'},{p:'docs',i:'\ud83d\udcc4',l:'\u516c\u6587\u7ba1\u7406'},{p:'leave',i:'\ud83d\udccb',l:'\u8bf7\u5047\u7ba1\u7406'},{p:'users',i:'\ud83d\udc65',l:'\u7528\u6237\u7ba1\u7406'}],
    COUNSELOR:[{p:'dashboard',i:'\ud83d\udcca',l:'\u5de5\u4f5c\u53f0'},{p:'leave',i:'\ud83d\udccb',l:'\u8bf7\u5047\u5ba1\u6279'},{p:'docs',i:'\ud83d\udcc4',l:'\u516c\u6587\u7ba1\u7406'}],
    TEACHER:[{p:'dashboard',i:'\ud83d\udcca',l:'\u5de5\u4f5c\u53f0'},{p:'leave',i:'\ud83d\udccb',l:'\u8bf7\u5047\u5ba1\u6279'}],
    STUDENT:[{p:'dashboard',i:'\ud83d\udcca',l:'\u5de5\u4f5c\u53f0'},{p:'leave',i:'\ud83d\udcdd',l:'\u8bf7\u5047\u7533\u8bf7'}],
    EMPLOYEE:[{p:'dashboard',i:'\ud83d\udcca',l:'\u5de5\u4f5c\u53f0'},{p:'leave',i:'\ud83d\udcdd',l:'\u8bf7\u5047\u7533\u8bf7'}],
    MANAGER:[{p:'dashboard',i:'\ud83d\udcca',l:'\u5de5\u4f5c\u53f0'},{p:'leave',i:'\ud83d\udccb',l:'\u5ba1\u6279\u7ba1\u7406'},{p:'docs',i:'\ud83d\udcc4',l:'\u516c\u6587\u7ba1\u7406'}],
    HR:[{p:'dashboard',i:'\ud83d\udcca',l:'\u5de5\u4f5c\u53f0'},{p:'users',i:'\ud83d\udc65',l:'\u4eba\u4e8b\u7ba1\u7406'},{p:'leave',i:'\ud83d\udccb',l:'\u8003\u52e4\u7ba1\u7406'}]
  };
  var items = menus[role] || menus.STUDENT;
  nav.innerHTML = items.map(function(m) {
    return '<a class="nav-item" href="javascript:void(0)" onclick="switchPage(\'' + m.p + '\')">' + m.i + ' ' + m.l + '</a>';
  }).join('');
  var first = nav.querySelector('.nav-item');
  if (first) first.classList.add('active');
}

function switchPage(page) {
  var pages = ['dashboard','docs','leave','users'];
  if (page === 'users' && userRole !== 'ADMIN') { showToast('\u65e0\u6743\u9650','error'); return; }
  document.querySelectorAll('.nav-item').forEach(function(i){i.classList.remove('active')});
  var activeEl = document.querySelector('.nav-item[onclick*="'+page+'"]');
  if (activeEl) activeEl.classList.add('active');
  pages.forEach(function(p){
    var pg = document.getElementById('page-'+p);
    if (pg) pg.style.display = p === page ? 'block' : 'none';
  });
  var titles = {dashboard:'\u5de5\u4f5c\u53f0',docs:'\u516c\u6587\u7ba1\u7406',leave:'\u8bf7\u5047\u7ba1\u7406',users:'\u7528\u6237\u7ba1\u7406'};
  var pt = document.getElementById('pageTitle');
  if (pt) pt.textContent = titles[page] || '\u5de5\u4f5c\u53f0';
  if (page === 'docs') loadDocs();
  else if (page === 'leave') loadLeave();
  else if (page === 'users') loadUsers();
  else if (page === 'dashboard') loadDashboard();
}

// ===== \u7528\u6237\u7ba1\u7406 =====
async function loadUsers() {
  var tbody = document.getElementById('usersBody');
  if (!tbody) return;
  tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px">\u52a0\u8f7d\u4e2d...</td></tr>';
  try {
    var res = await fetch(API + '/api/users', getHeaders());
    var data = await res.json();
    var rn = {ADMIN:'\u7ba1\u7406\u5458',COUNSELOR:'\u8f85\u5bfc\u5458',TEACHER:'\u8001\u5e08',STUDENT:'\u5b66\u751f',EMPLOYEE:'\u804c\u5de5',MANAGER:'\u7ecf\u7406',HR:'\u4eba\u4e8b'};
    var rc = {ADMIN:'#f56c6c',COUNSELOR:'#e6a23c',TEACHER:'#409eff',STUDENT:'#67c23a',EMPLOYEE:'#909399',MANAGER:'#7c3aed',HR:'#059669'};
    tbody.innerHTML = data.map(function(u) {
      var color = rc[u.role]||'#909399';
      var del = u.id !== currentUser.id ? '<button class="table-btn table-btn-danger" onclick="deleteUser('+u.id+',''" style="padding:2px 8px;font-size:11px">\u5220\u9664</button>' : '<span style="color:var(--text-muted);font-size:11px">\u5f53\u524d\u7528\u6237</span>';
      return '<tr><td>'+u.id+'</td><td><strong>'+u.name+'</strong></td><td>'+u.username+'</td><td><span style="background:'+color+'15;color:'+color+';padding:2px 8px;border-radius:8px;font-size:11px">'+(rn[u.role]||u.role)+'</span></td><td>'+(u.department||'-')+'</td><td>'+(u.created_at||'-')+'</td><td>'+del+'</td></tr>';
    }).join('');
  } catch(e) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--danger)">\u52a0\u8f7d\u5931\u8d25</td></tr>'; }
}

function showUserModal() {
  var m = document.getElementById('userModal');
  if(m){m.style.display='flex';document.getElementById('userForm').reset();document.getElementById('userError').textContent=''}
}
function closeUserModal(){var m=document.getElementById('userModal');if(m)m.style.display='none'}

async function submitUser(){
  var data={username:document.getElementById('newUsername').value.trim(),password:document.getElementById('newPassword').value,name:document.getElementById('newName').value.trim(),role:document.getElementById('newRole').value,department:document.getElementById('newDept').value.trim()};
  var err=document.getElementById('userError');
  if(!data.username||!data.password||!data.name){err.textContent='\u8bf7\u586b\u5199\u5b8c\u6574\u4fe1\u606f';return}
  try{
    var res=await fetch(API+'/api/users',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(data)});
    var result=await res.json();
    if(result.success){closeUserModal();showToast('\u521b\u5efa\u6210\u529f','success');loadUsers()}
    else err.textContent=result.message||'\u521b\u5efa\u5931\u8d25';
  }catch(e){err.textContent='\u7f51\u7edc\u9519\u8bef'}
}

async function deleteUser(id,name){
  if(!confirm('\u786e\u8ba4\u5220\u9664\u7528\u6237"'+name+'\"\uff1f'))return;
  try{
    var res=await fetch(API+'/api/users/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
    var result=await res.json();
    if(result.success){showToast('\u5df2\u5220\u9664','success');loadUsers()}
    else showToast(result.message||'\u5220\u9664\u5931\u8d25','error');
  }catch(e){showToast('\u7f51\u7edc\u9519\u8bef','error')}
}
