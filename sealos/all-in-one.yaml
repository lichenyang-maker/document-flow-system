apiVersion: v1
kind: Namespace
metadata:
  name: document-flow
  labels:
    name: document-flow
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: document-flow-data
  namespace: document-flow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-flow-system
  namespace: document-flow
  labels:
    app: document-flow-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: document-flow-system
  template:
    metadata:
      labels:
        app: document-flow-system
    spec:
      containers:
        - name: document-flow-system
          image: your-registry/document-flow-system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_PATH
              value: "/app/data/document_flow.db"
            - name: FEISHU_APP_ID
              value: "cli_aaa152828fb95bda"
            - name: FEISHU_APP_SECRET
              value: "61tkmvxLdXZ2Tx0m4AgZFez4CC0xvzjx"
            - name: SILICONFLOW_API_KEY
              value: "sk-ananqfsipxweyiejefqltsbladjogmgnwfvxnihtjtnxwjem"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: document-flow-data
---
apiVersion: v1
kind: Service
metadata:
  name: document-flow-system
  namespace: document-flow
  labels:
    app: document-flow-system
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: document-flow-system
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: document-flow-system
  namespace: document-flow
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "sealos-cloud-ca"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
    - host: document-flow.example.cloud.sealos.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: document-flow-system
                port:
                  number: 80
